<!-- Action Toolbar - Responsive -->

<!-- Search -->

<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-lg">search</span>

<!-- Receipts Table -->

<thead class="bg-primary/5 border-b border-primary/10">

<th class="text-left px-6 py-4 text-xs font-bold text-primary uppercase tracking-wider">Reference</th>

</thead>

</tbody>

<!-- Kanban View (Hidden by default) -->

<h3 class="font-bold text-slate-700 mb-4">Ready</h3>
<div id="readyColumn" class="space-y-3">
<!-- Kanban items will be populated by JavaScript -->
</div>
</div>
<div class="bg-background-card border border-primary/10 rounded-xl p-4 lg:p-6">
<h3 class="font-bold text-slate-700 mb-4">Done</h3>

<!-- Kanban items will be populated by JavaScript -->

<script>
// Mobile sidebar functions
function toggleMobileSidebar() {
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('mobileSidebarOverlay');
    
    if (sidebar && overlay) {
        sidebar.classList.toggle('-translate-x-full');
        sidebar.classList.toggle('translate-x-0');
        overlay.classList.toggle('hidden');
    }
}

function closeMobileSidebar() {
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('mobileSidebarOverlay');
    
    if (sidebar && overlay) {
        sidebar.classList.add('-translate-x-full');
        sidebar.classList.remove('translate-x-0');
        overlay.classList.add('hidden');
    }
}

// Make functions globally accessible
window.toggleMobileSidebar = toggleMobileSidebar;
window.closeMobileSidebar = closeMobileSidebar;

// Initialize page
document.addEventListener('DOMContentLoaded', function() {
    loadReceiptsFromAPI();
    
    // Search functionality
    document.getElementById('searchInput').addEventListener('input', function(e) {
        searchReceipts(e.target.value);
    });
});

// Global receipts data
let receiptsData = [];

async function loadReceiptsFromAPI() {
    try {
        receiptsData = await api.getReceipts();
        console.log('Receipts loaded from API:', receiptsData);
        renderReceiptsTable();
        renderKanbanView();
    } catch (err) {
        console.error('Failed to load receipts:', err);
    }
}

function renderReceiptsTable() {
    const tbody = document.getElementById('receiptsTableBody');
    if (!tbody) {
        console.error('receiptsTableBody not found');
        return;
    }
    
    tbody.innerHTML = '';
    console.log('Rendering receipts table with data:', receiptsData);
    
    receiptsData.forEach(receipt => {
        const row = document.createElement('tr');
        row.className = 'border-b border-primary/5 hover:bg-primary/5 transition-colors';
        row.style.cursor = 'pointer';
        row.onclick = () => {
            if (receipt?.id) {
                window.location.href = `receipt-form.html?id=${receipt.id}`;
            }
        };
        row.innerHTML = `
            <td class="px-6 py-4 text-sm font-medium text-slate-800">${receipt.reference || ''}</td>
            <td class="px-6 py-4 text-sm text-slate-600">${receipt.from_location || receipt.supplier || '-'}</td>
            <td class="px-6 py-4 text-sm text-slate-600">${receipt.to_location || 'Warehouse'}</td>
            <td class="px-6 py-4 text-sm text-slate-600">${receipt.contact || receipt.supplier || '-'}</td>
            <td class="px-6 py-4 text-sm text-slate-600">${receipt.receipt_date || '-'}</td>
            <td class="px-6 py-4">
                <span class="px-3 py-1 rounded-full text-xs font-medium ${getStatusClass(receipt.status)}">${receipt.status || 'draft'}</span>
            </td>
        `;
        tbody.appendChild(row);
    });
}

function getStatusClass(status) {
    const classes = {
        'draft': 'bg-gray-100 text-gray-600',
        'ready': 'bg-primary/10 text-primary',
        'done': 'bg-status-green/10 text-status-green',
        'cancelled': 'bg-late-red/10 text-late-red'
    };
    return classes[status] || classes['draft'];
}

function renderKanbanView() {
    const columns = {
        'draft': document.getElementById('draftColumn'),
        'ready': document.getElementById('readyColumn'),
        'done': document.getElementById('doneColumn')
    };
    
    // Clear columns
    Object.values(columns).forEach(col => {
        if (col) col.innerHTML = '';
    });
    
    receiptsData.forEach(receipt => {
        const column = columns[receipt.status] || columns['draft'];
        if (column) {
            const card = document.createElement('div');
            card.className = 'bg-background-main border border-primary/10 rounded-lg p-3 mb-2';
            card.innerHTML = `
                <p class="font-medium text-sm text-slate-800">${receipt.reference}</p>
                <p class="text-xs text-slate-500">${receipt.supplier || 'No supplier'}</p>
            `;
            column.appendChild(card);
        }
    });
}

async function searchReceipts(query) {
    try {
        receiptsData = await api.getReceipts({ search: query });
        renderReceiptsTable();
    } catch (err) {
        console.error('Search failed:', err);
    }
}

function showListView() {
    document.getElementById('listView').classList.remove('hidden');
    document.getElementById('kanbanView').classList.add('hidden');
    document.getElementById('listViewBtn').classList.add('bg-primary', 'text-white');
    document.getElementById('listViewBtn').classList.remove('bg-background-card', 'border', 'border-primary/10', 'text-slate-600');
    document.getElementById('kanbanViewBtn').classList.remove('bg-primary', 'text-white');
    document.getElementById('kanbanViewBtn').classList.add('bg-background-card', 'border', 'border-primary/10', 'text-slate-600');
}

function showKanbanView() {
    document.getElementById('listView').classList.add('hidden');
    document.getElementById('kanbanView').classList.remove('hidden');
    document.getElementById('kanbanViewBtn').classList.add('bg-primary', 'text-white');
    document.getElementById('kanbanViewBtn').classList.remove('bg-background-card', 'border', 'border-primary/10', 'text-slate-600');
    document.getElementById('listViewBtn').classList.remove('bg-primary', 'text-white');
    document.getElementById('listViewBtn').classList.add('bg-background-card', 'border', 'border-primary/10', 'text-slate-600');
    renderKanbanView();
}
</script>
